<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e8e8e8;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header { margin-bottom: 32px; }
  .brand { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #E9FF2E; margin-bottom: 8px; }
  .title { font-size: 28px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #888; line-height: 1.5; }
  .progress-bar { height: 2px; background: #1e1e1e; border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
  .progress-fill { height: 100%; background: #E9FF2E; transition: width 0.4s ease; }
  .question-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .question-number { font-size: 16px; letter-spacing: 0.05em; color: #E9FF2E; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  .question-text { font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 16px; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { padding: 12px 16px; border: 1px solid #2a2a2a; border-radius: 8px; cursor: pointer; font-size: 14px; color: #ccc; transition: all 0.15s; background: #0f0f0f; }
  .option:hover { border-color: #E9FF2E; color: #fff; }
  .option.selected { border-color: #E9FF2E; background: rgba(233,255,46,0.08); color: #E9FF2E; }
  .input-field { width: 100%; padding: 12px 16px; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .input-field:focus { border-color: #E9FF2E; }
  .btn { padding: 14px 28px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: #E9FF2E; color: #0a0a0a; width: 100%; }
  .btn-primary:hover { background: #f0c030; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .result-type { display: inline-block; padding: 4px 12px; background: rgba(233,255,46,0.1); border: 1px solid #E9FF2E; border-radius: 20px; font-size: 12px; color: #E9FF2E; margin-bottom: 16px; }
  .result-content { font-size: 14px; line-height: 1.8; color: #ccc; white-space: pre-wrap; }
  .loading { display: flex; align-items: center; gap: 12px; padding: 24px; color: #888; font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2px solid #2a2a2a; border-top-color: #E9FF2E; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .step-indicator { font-size: 12px; color: #555; }
  .hidden { display: none; }
  .error-text { color: #E24B4A; font-size: 13px; margin-top: 8px; min-height: 20px; }
  .purchase-link { margin-top: 16px; font-size: 12px; color: #555; text-align: center; }
  .purchase-link a { color: #E9FF2E; text-decoration: none; }
  .purchase-link a:hover { text-decoration: underline; }
  .bar-item { margin-bottom: 12px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 4px; }
  .bar-track { height: 6px; background: #1e1e1e; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .restart-btn { margin-top: 16px; padding: 10px 20px; background: transparent; border: 1px solid #2a2a2a; border-radius: 8px; color: #888; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .restart-btn:hover { border-color: #555; color: #ccc; }

  /* iOS PWA 加入主畫面 提示卡片 */
  #pwaHintCard {
    position: fixed;
    left: 16px; right: 16px;
    bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    max-width: 400px;
    margin: 0 auto;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 14px 14px 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    z-index: 9999;
    transform: translateY(120%);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
  }
  #pwaHintCard.show {
    transform: translateY(0);
    opacity: 1;
  }
  #pwaHintCard .pwa-icon-wrap {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: rgba(233,255,46,0.1);
    border: 1px solid rgba(233,255,46,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #pwaHintCard .pwa-text {
    flex: 1;
    font-size: 13px;
    color: #e8e8e8;
    line-height: 1.4;
  }
  #pwaHintCard .pwa-close {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: #555;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  #pwaHintCard .pwa-close:hover { color: #ccc; background: rgba(255,255,255,0.06); }
</style>

// 共用工具：HTML escape，避免使用者輸入或AI回傳文字中的特殊字元被當成HTML/程式碼執行
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 驗證碼驗證
async function verifyKey() {
  const key = document.getElementById('licenseKey').value.trim();
  const errorEl = document.getElementById('keyError');
  const btn = document.getElementById('verifyBtn');

  if (!key) {
    errorEl.textContent = '請輸入驗證碼';
    return;
  }

  btn.textContent = '驗證中...';
  btn.disabled = true;
  errorEl.textContent = '';

  try {
    const response = await fetch('/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: key })
    });

    const data = await response.json();

    if (data.valid) {
      sessionStorage.setItem('verified', 'true');
      btn.textContent = '✓ 已解鎖';
      errorEl.style.color = '#4CAF7D';
      errorEl.textContent = '驗證成功！感謝支持 🙏';
    } else {
      errorEl.style.color = '#E24B4A';
      errorEl.textContent = data.message;
      btn.textContent = '驗證 →';
      btn.disabled = false;
    }
  } catch (err) {
    errorEl.textContent = '驗證失敗，請稍後再試';
    btn.textContent = '驗證 →';
    btn.disabled = false;
  }
}

// ===== iOS PWA「加入主畫面」提示卡片 =====

const PWA_HINT_DISMISS_KEY = 'pwaHintDismissedAt';
const PWA_HINT_DISMISS_DAYS = 14;
let _pwaHintShownThisSession = false;

// 條件1+2：是否為 iOS 裝置且使用 Safari（排除 iOS 上的 Chrome/Firefox/Edge/Opera）
function isIOSSafari() {
  const ua = navigator.userAgent;
  const isIOSDevice = /iPad|iPhone|iPod/.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS 偽裝成 Mac 但有觸控點
  if (!isIOSDevice) return false;

  const isOtherIOSBrowser = /CriOS|FxiOS|EdgiOS|OPiOS|Mercury|GSA/i.test(ua);
  const isSafari = /Safari/i.test(ua) && !isOtherIOSBrowser;
  return isSafari;
}

// 條件3：是否已經是從主畫面開啟（standalone模式）
function isAlreadyInstalled() {
  return window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
}

// 條件4：是否在14天內關閉過提示
function wasRecentlyDismissed() {
  const dismissedAt = localStorage.getItem(PWA_HINT_DISMISS_KEY);
  if (!dismissedAt) return false;
  const daysPassed = (Date.now() - parseInt(dismissedAt, 10)) / (1000 * 60 * 60 * 24);
  return daysPassed < PWA_HINT_DISMISS_DAYS;
}

function checkAndShowPWAHint() {
  if (_pwaHintShownThisSession) return;
  if (document.getElementById('pwaHintCard')) return;
  if (!isIOSSafari()) return;
  if (isAlreadyInstalled()) return;
  if (wasRecentlyDismissed()) return;

  showPWAHintCard();
}

function showPWAHintCard() {
  _pwaHintShownThisSession = true;

  const card = document.createElement('div');
  card.id = 'pwaHintCard';
  card.innerHTML = `
    <div class="pwa-icon-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#E9FF2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"/>
        <path d="M8 7l4-4 4 4"/>
        <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/>
      </svg>
    </div>
    <div class="pwa-text">加入主畫面，像 App 一樣使用</div>
    <button class="pwa-close" onclick="dismissPWAHint()" aria-label="關閉">✕</button>
  `;
  document.body.appendChild(card);

  // 下一個 frame 再加 show class，觸發滑入動畫
  requestAnimationFrame(() => {
    requestAnimationFrame(() => card.classList.add('show'));
  });
}

function dismissPWAHint() {
  const card = document.getElementById('pwaHintCard');
  if (card) {
    card.classList.remove('show');
    setTimeout(() => card.remove(), 400);
  }
  localStorage.setItem(PWA_HINT_DISMISS_KEY, Date.now().toString());
}

// ===== 手機縮放鎖定（viewport meta 標籤在新版 iOS Safari 可能被忽略，這裡用JS雙重防護） =====

// 防止雙指縮放（pinch-zoom）：偵測到兩指以上觸控時阻止預設行為
document.addEventListener('touchmove', function(e) {
  if (e.touches.length > 1) {
    e.preventDefault();
  }
}, { passive: false });

// 防止雙擊縮放（double-tap zoom）：偵測兩次點擊間隔過短時阻止第二次的預設行為
let _lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - _lastTouchEnd <= 300) {
    e.preventDefault();
  }
  _lastTouchEnd = now;
}, { passive: false });

// 頁面載入直接開始問卷（驗證碼功能保留但暫不強制）
window.onload = function() {
  renderQuestion();

  // 進站6秒後檢查是否要顯示 PWA 提示（先讓使用者看過畫面，不打斷）
  setTimeout(checkAndShowPWAHint, 6000);
};

// 問卷邏輯
function renderQuestion() {
  const q = questions[currentQ];
  const progress = (currentQ / questions.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  // 往前找最近定義的 section，讓每一題都顯示所屬區塊
  let currentSection = '';
  for (let i = currentQ; i >= 0; i--) {
    if (questions[i].section) { currentSection = questions[i].section; break; }
  }
  const sectionHtml = currentSection ? `
    <div style="font-size:16px;letter-spacing:0.05em;color:#E9FF2E;margin-bottom:12px;font-weight:500;">${currentSection}</div>
  ` : '';

  let inputHtml = '';

  if (q.type === 'number') {
    inputHtml = `
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <input type="number" id="numInput_${q.id}" class="input-field"
          placeholder="${q.placeholder}" min="${q.min||0}" max="${q.max||100}"
          value="${answers[q.id] || ''}"
          oninput="selectNumber('${q.id}', this.value)"
          style="max-width:160px;font-size:20px;text-align:center;">
        <span style="font-size:16px;color:#888;">${q.unit || ''}</span>
      </div>
      <div style="font-size:12px;color:#444;margin-top:8px;">輸入 ${q.min||0} - ${q.max||100} 之間的數字</div>
    `;
  } else if (q.type === 'textarea') {
    inputHtml = `
      <textarea id="textInput_${q.id}" 
        placeholder="${q.placeholder}"
        oninput="selectText('${q.id}', this.value)"
        style="width:100%;min-height:100px;padding:12px 16px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:8px;color:#e8e8e8;font-size:14px;outline:none;resize:vertical;line-height:1.6;font-family:inherit;"
        onfocus="this.style.borderColor='#E9FF2E'"
        onblur="this.style.borderColor='#2a2a2a'">${escapeHtml(answers[q.id] || '')}</textarea>
    `;
  } else if (q.type === 'allocation') {
    const currentAlloc = answers[q.id] || {};
    const mainFields = q.fields.filter(f => !f.separate);
    const debtFields = q.fields.filter(f => f.separate);
    const total = mainFields.reduce((sum, f) => sum + (parseFloat(currentAlloc[f.id]) || 0), 0);
    const totalColor = Math.abs(total - 100) < 0.1 ? '#4CAF7D' : total > 100 ? '#E24B4A' : '#888';
    const noteHtml = q.note ? `<div style="font-size:12px;color:#555;margin-bottom:12px;">${q.note}</div>` : '';
    const renderField = (f) => `
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${f.color};flex-shrink:0;"></div>
        <div style="flex:1;">
          <div style="font-size:13px;color:#e8e8e8;">${f.label}</div>
          <div style="font-size:11px;color:#555;">${f.sublabel}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <input type="number" min="0" max="200"
            placeholder="0"
            value="${currentAlloc[f.id] || ''}"
            oninput="updateAlloc('${q.id}', '${f.id}', this.value, ${!f.separate})"
            style="width:70px;padding:8px 10px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:6px;color:#e8e8e8;font-size:15px;text-align:center;outline:none;"
            onfocus="this.style.borderColor='#E9FF2E'"
            onblur="this.style.borderColor='#2a2a2a'">
          <span style="font-size:13px;color:#555;">%</span>
        </div>
      </div>
    `;
    inputHtml = `
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
        ${noteHtml}
        ${mainFields.map(f => renderField(f)).join('')}
        <div style="border-top:1px solid #1e1e1e;padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:12px;color:#555;">前四項合計</span>
          <span id="allocTotal" style="font-size:16px;font-weight:500;color:${totalColor};">${total.toFixed(0)}%</span>
        </div>
        ${debtFields.length > 0 ? `
          <div style="border-top:1px solid #1e1e1e;padding-top:10px;">
            <div style="font-size:11px;color:#555;margin-bottom:8px;letter-spacing:0.05em;">負債（單獨填寫）</div>
            ${debtFields.map(f => renderField(f)).join('')}
          </div>
        ` : ''}
      </div>
    `;
  } else {
    inputHtml = `
      <div class="options">
        ${q.options.map(opt => `
          <div class="option ${answers[q.id] === opt ? 'selected' : ''}"
               onclick="selectOption('${q.id}', '${opt}', this)">
            ${opt}
          </div>
        `).join('')}
      </div>
    `;
  }

  const isAnswered = answers[q.id] !== undefined && answers[q.id] !== '';
  const isOptional = q.optional === true;
  const canProceed = isAnswered || isOptional;

  document.getElementById('questionArea').innerHTML = `
    <div class="question-card">
      ${sectionHtml}
      <div class="question-number">問題 ${currentQ + 1} / ${questions.length}${isOptional ? '　<span style="color:#444;font-size:10px;">選填</span>' : ''}</div>
      <div class="question-text">${q.text}</div>
      ${inputHtml}
    </div>
    <div class="nav">
      <button onclick="prevQuestion()" 
              style="padding:10px 18px;background:transparent;border:1px solid #2a2a2a;border-radius:8px;color:${currentQ === 0 ? '#333' : '#888'};font-size:13px;cursor:${currentQ === 0 ? 'not-allowed' : 'pointer'};"
              ${currentQ === 0 ? 'disabled' : ''}>
        ← 上一題
      </button>
      <span class="step-indicator">${currentQ + 1} / ${questions.length}</span>
      <button class="btn btn-primary" id="nextBtn"
              onclick="nextQuestion()"
              ${canProceed ? '' : 'disabled'}
              style="width: auto; padding: 12px 24px;">
        ${currentQ === questions.length - 1 ? '分析我的配置 →' : '下一題 →'}
      </button>
    </div>
${renderFooterNotice()}
  `;
}

function selectNumber(qId, value) {
  if (value !== '' && value !== null) {
    answers[qId] = value + (questions.find(q => q.id === qId)?.unit || '');
    document.getElementById('nextBtn').disabled = false;
  } else {
    delete answers[qId];
    document.getElementById('nextBtn').disabled = true;
  }
}

function updateAlloc(qId, fieldId, value, isMain) {
  if (!answers[qId]) answers[qId] = {};
  if (value === '' || value === null) {
    delete answers[qId][fieldId];
  } else {
    answers[qId][fieldId] = parseFloat(value) || 0;
  }
  // 只計算前四項（非負債）的合計
  const q = questions.find(q => q.id === qId);
  const mainFields = q.fields.filter(f => !f.separate);
  const total = mainFields.reduce((sum, f) => sum + (parseFloat(answers[qId][f.id]) || 0), 0);
  const totalEl = document.getElementById('allocTotal');
  if (totalEl) {
    totalEl.textContent = total.toFixed(0) + '%';
    totalEl.style.color = Math.abs(total - 100) < 0.1 ? '#4CAF7D' : total > 100 ? '#E24B4A' : '#888';
  }
}

function selectText(qId, value) {
  answers[qId] = value;
  // textarea 是選填，不影響下一題按鈕
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function selectOption(qId, value, el) {
  answers[qId] = value;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    analyzeWithAI();
  }
}

async function analyzeWithAI() {
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('loadingArea').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '100%';

  const summary = questions
    .filter(q => answers[q.id] !== undefined && answers[q.id] !== '')
    .map(q => {
      if (q.type === 'allocation' && typeof answers[q.id] === 'object') {
        const fields = q.fields.map(f => `${f.label}${answers[q.id][f.id] ? answers[q.id][f.id] + '%' : '未填'}`).join('、');
        return `${q.text}: ${fields}`;
      }
      return `${q.text}: ${answers[q.id]}`;
    })
    .join('\n');

  const prompt = `你是一位專業的資產配置顧問，有6年真實交易經驗，曾經歷兩次千萬獲利和兩次重大虧損，深刻理解風險管理的重要性。

用戶的問卷答案如下：
${summary}

請仔細分析以上答案，根據用戶的真實狀況給出個人化建議。注意：
- 如果用戶有穩定收入且風險承受度高，高風險資產可以到20-30%
- 如果用戶沒有收入且剛虧損，現金要50%以上
- 配置比例必須真實反映用戶狀況，不要給千篇一律的答案
- type可以是防禦型、平衡型、積極型，要根據答案判斷
- risk_score要根據用戶真實狀況給1-10的分數

只回傳以下格式的JSON，不要有任何其他文字、解釋或markdown符號：

{"type":"根據分析填入","nickname":"根據分析填入","type_reason":"一句話說明","risk_score":0,"core_advice":"2-3句話建議","allocation":[{"label":"現金/定存","percent":0,"color":"#888780","advice":"具體建議"},{"label":"配息與保值資產","percent":0,"color":"#7F77DD","advice":"具體建議"},{"label":"成長型資產","percent":0,"color":"#378ADD","advice":"具體建議"},{"label":"高風險資產","percent":0,"color":"#E24B4A","advice":"具體建議"}],"key_message":"最關鍵一句話"}

所有percent填入真實數字，加總必須等於100。「配息與保值資產」這一類請合併涵蓋債券、優先股、REITs、黃金等產生穩定收益或保值功能的資產，advice中可視情況分別提及。
每個 allocation 的 advice 要具體說明放哪個產品、為什麼，以及一句提醒或注意事項，約2-3句話。
core_advice 要針對用戶的真實痛點和資產現況給出具體建議，至少6-8句話，內容涵蓋：目前狀況的整體評估、最需要優先處理的問題、具體的資金運用方向、可能的風險提醒，以及一個中長期的建議方向。用自然流暢的段落呈現，避免條列。

nickname 是根據 type 給的一個更有個性、更適合分享到社群的稱號，4-8個字，要有畫面感和記憶點，不要只是重複type。參考風格（僅供參考風格，不要照抄字面）：
- 防禦型 → 「現金為王的謹慎派」
- 平衡型 → 「穩健派操盤手」
- 積極型 → 「梭哈型冒險家」
請根據用戶的實際答案細節（例如具體的心態、擔憂、資產結構）調整用詞，讓稱號感覺是為這個人量身打造的，不是套版。`;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await response.json();
    // JSON Mode 保證 data.result 直接是物件，不需要解析
    if (data.result && typeof data.result === 'object') {
      showResult(data.result);
    } else {
      showResultFallback(typeof data.result === 'string' ? data.result : '分析時發生錯誤，請稍後再試。');
    }
  } catch (err) {
    showResultFallback('分析時發生錯誤，請稍後再試。');
  }
}

${renderFooterNotice()}

function showResult(d) {
  document.getElementById('loadingArea').classList.add('hidden');
  document.getElementById('resultArea').classList.remove('hidden');

  // 使用者完成一次完整分析，代表他真的在用這個工具，追加觸發一次PWA提示檢查（已顯示過/已關閉過會自動略過）
  checkAndShowPWAHint();

  const typeColors = { '防禦型': '#4CAF7D', '平衡型': '#E9FF2E', '積極型': '#E24B4A' };
  const typeColor = typeColors[d.type] || '#E9FF2E';

  const allocationCards = d.allocation.map((item, idx) => `
    <div id="allocCard_${idx}" class="alloc-card" data-idx="${idx}"
      style="background:#0f0f0f;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.25s ease;"
      onclick="highlightSlice(${idx})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${item.color};flex-shrink:0;"></div>
          <span style="font-size:13px;font-weight:500;color:#e8e8e8;">${escapeHtml(item.label)}</span>
        </div>
        <span style="font-size:16px;font-weight:500;color:${item.color};">${item.percent}%</span>
      </div>
      <div style="height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden;margin-bottom:6px;">
        <div class="alloc-bar" style="height:100%;width:0%;background:${item.color};border-radius:2px;transition:width 1s cubic-bezier(0.16, 1, 0.3, 1);"></div>
      </div>
      <div style="font-size:12px;color:#666;line-height:1.5;">${escapeHtml(item.advice)}</div>

async function generateShareCard() {
  const btn = document.getElementById('shareCardBtn');
  const btnText = document.getElementById('shareCardBtnText');
  const d = window._lastResult;

  if (!d || !window.html2canvas) {
    alert('請先完成分析，或稍後再試一次');
    return;
  }

  const originalText = btnText.textContent;
  btnText.textContent = '產生中...';
  btn.style.opacity = '0.7';
  btn.style.pointerEvents = 'none';

  const typeColors = { '防禦型': '#4CAF7D', '平衡型': '#E9FF2E', '積極型': '#E24B4A' };
  const typeColor = typeColors[d.type] || '#E9FF2E';

  // 卡片尺寸：1080x1080，內距64px，每個區塊高度都精算過，加總留有餘裕，避免html2canvas裁切時把底部文字切掉
  const CARD_SIZE = 1080;
  const PAD = 64;

  const cardWrap = document.createElement('div');
  cardWrap.style.cssText = `position:fixed; left:-9999px; top:0; width:${CARD_SIZE}px; height:${CARD_SIZE}px; background:#0a0a0a; padding:${PAD}px; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; display:flex; flex-direction:column; overflow:hidden;`;

  const donutCanvasId = 'shareDonut_' + Date.now();

  const legendItems = d.allocation.map(item => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div style="width:16px;height:16px;border-radius:4px;background:${item.color};flex-shrink:0;"></div>
      <span style="font-size:24px;color:#ccc;white-space:nowrap;">${escapeHtml(item.label)}</span>
      <span style="font-size:24px;font-weight:600;color:#f0f0f0;margin-left:6px;">${item.percent}%</span>
    </div>
  `).join('');

  cardWrap.innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:36px; flex-shrink:0;">
      <img src="${document.querySelector('link[rel="apple-touch-icon"]').href}" style="width:52px;height:52px;border-radius:50%;">
      <div>
        <div style="font-size:20px;letter-spacing:0.1em;color:#E9FF2E;font-weight:600;text-transform:uppercase;">CompoundWater × AI</div>
        <div style="font-size:22px;color:#ffffff;font-weight:500;margin-top:5px;">資產配置分析</div>
      </div>
    </div>

    <div style="margin-bottom:36px; flex-shrink:0;">
      <div style="font-size:18px;color:${typeColor};letter-spacing:0.05em;margin-bottom:10px;">AI幫我取的稱號是</div>
      <div style="font-size:56px;font-weight:800;color:#f5f5f5;line-height:1.2;margin-bottom:14px;">「${escapeHtml(d.nickname)}」</div>
      <div style="display:inline-block;background:rgba(233,255,46,0.12);border:1px solid rgba(233,255,46,0.35);border-radius:20px;padding:6px 18px;">
        <span style="font-size:20px;font-weight:600;color:#E9FF2E;">${escapeHtml(d.type)}</span>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:center;gap:32px;height:380px;flex-shrink:0;">
      <div style="flex-shrink:0;">
        <canvas id="${donutCanvasId}" width="640" height="640" style="width:320px;height:320px;"></canvas>
      </div>
      <div style="flex-shrink:0;">
        ${legendItems}
      </div>
    </div>

    <div style="background:rgba(233,255,46,0.08); border:2px solid rgba(233,255,46,0.3); border-radius:24px; padding:28px 32px; margin-top:32px; flex-shrink:0;">
      <div style="font-size:18px;color:#E9FF2E;margin-bottom:10px;">✦ 最重要的一件事</div>
      <div style="font-size:26px;color:#E9FF2E;font-weight:600;line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${escapeHtml(d.key_message)}</div>
    </div>

    <div style="text-align:center;margin-top:32px;font-size:26px;color:#ffffff;font-weight:700;letter-spacing:0.03em;flex-shrink:0;">
      www.compoundwater.app
    </div>
  `;

  document.body.appendChild(cardWrap);

  await new Promise(resolve => setTimeout(resolve, 50));

  const canvasEl = document.getElementById(donutCanvasId);
  new Chart(canvasEl, {
    type: 'doughnut',
    data: {
      labels: d.allocation.map(i => i.label),
      datasets: [{
        data: d.allocation.map(i => i.percent),
        backgroundColor: d.allocation.map(i => i.color),
        borderWidth: 4,
        borderColor: '#0a0a0a'
      }]
    },
    options: {
      responsive: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      cutout: '58%'
    }
  });

  await new Promise(resolve => setTimeout(resolve, 300));

  try {
    // 不寫死 width/height 給 html2canvas，讓它照實際 DOM 尺寸（已精算過剛好等於CARD_SIZE）截圖，避免內容溢出時被強制裁切
    const canvas = await html2canvas(cardWrap, {
      backgroundColor: '#0a0a0a',
      scale: 1,
      useCORS: true,
      logging: false
    });

    document.body.removeChild(cardWrap);

    canvas.toBlob(async (blob) => {
      const dateStr = new Date().toLocaleDateString('zh-TW').replace(/\//g, '');
      const fileName = `CompoundWater_分享卡_${dateStr}.png`;

      if (navigator.share && navigator.canShare) {
        const file = new File([blob], fileName, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: 'CompoundWater 資產配置分析',
              text: '看看我的AI資產配置分析結果'
            });
            btnText.textContent = '✓ 已分享';
            setTimeout(() => { btnText.textContent = originalText; }, 2000);
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
            return;
          } catch (shareErr) {
            // 使用者取消分享，改走下載
          }
        }
      }

      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      link.click();
      btnText.textContent = '✓ 已下載';
      setTimeout(() => { btnText.textContent = originalText; }, 2000);
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    }, 'image/png');

  } catch (err) {
    console.error('Share card error:', err);
    if (document.body.contains(cardWrap)) document.body.removeChild(cardWrap);
    btnText.textContent = '產生失敗，請再試一次';
    setTimeout(() => { btnText.textContent = originalText; }, 2000);
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}

async function exportPDF() {
  const btn = document.getElementById('exportPdfBtn');
  const btnText = document.getElementById('exportPdfBtnText');
  const headerEl = document.querySelector('.header');
  const target = document.getElementById('pdfReportArea');

  if (!target || !window.html2canvas || !window.jspdf) {
    alert('匯出功能載入中，請稍後再試一次');
    return;
  }

  const originalText = btnText.textContent;
  btnText.textContent = '產生中，請稍候...';
  btn.style.opacity = '0.7';
  btn.style.pointerEvents = 'none';

  try {
    // 分別截取「頁首（logo+標題）」與「報告內容」，再合併進同一張PDF
    const headerCanvas = headerEl ? await html2canvas(headerEl, {
      backgroundColor: '#0a0a0a',
      scale: 2,
      useCORS: true,
      logging: false
    }) : null;

    const bodyCanvas = await html2canvas(target, {
      backgroundColor: '#0a0a0a',
      scale: 2,
      useCORS: true,
      logging: false
    });

    const { jsPDF } = window.jspdf;
    const pageWidthMM = 210;

    // 頁面左右留白邊距，讓內容置中且周圍有呼吸空間
    const marginMM = 14;
    const contentWidthMM = pageWidthMM - marginMM * 2;

    const bodyWidthMM = contentWidthMM;
    const bodyHeightMM = (bodyCanvas.height * bodyWidthMM) / bodyCanvas.width;

    let headerHeightMM = 0;
    const headerWidthMM = contentWidthMM;
    if (headerCanvas) {
      headerHeightMM = (headerCanvas.height * headerWidthMM) / headerCanvas.width;
    }

    // 頁首與內容間留一點間距，並在頁首下方模擬黃色底線
    const headerGap = headerCanvas ? 6 : 0;
    const totalHeightMM = marginMM + headerHeightMM + headerGap + bodyHeightMM + marginMM;

    const pdf = new jsPDF({
      orientation: 'p',
      unit: 'mm',
      format: [pageWidthMM, totalHeightMM]
    });

    // 先把整頁背景塗成跟網頁一致的深色，避免圖片間隙露出白底
    pdf.setFillColor(10, 10, 10);
    pdf.rect(0, 0, pageWidthMM, totalHeightMM, 'F');

    let cursorY = marginMM;

    if (headerCanvas) {
      pdf.addImage(headerCanvas.toDataURL('image/png'), 'PNG', marginMM, cursorY, headerWidthMM, headerHeightMM);
      cursorY += headerHeightMM;
      // 黃色底線，呼應網頁上 logo 下方的進度條（與內容同寬、置中）
      pdf.setDrawColor(233, 255, 46);
      pdf.setFillColor(233, 255, 46);
      pdf.rect(marginMM, cursorY + 2, contentWidthMM, 1, 'F');
      cursorY += 2 + headerGap;
    }

    pdf.addImage(bodyCanvas.toDataURL('image/png'), 'PNG', marginMM, cursorY, bodyWidthMM, bodyHeightMM);

    const dateStr = new Date().toLocaleDateString('zh-TW').replace(/\//g, '');
    pdf.save(`CompoundWater_資產配置報告_${dateStr}.pdf`);

    btnText.textContent = '✓ 已下載';
    setTimeout(() => { btnText.textContent = originalText; }, 2000);
  } catch (err) {
    console.error('PDF export error:', err);
    btnText.textContent = '匯出失敗，請再試一次';
    setTimeout(() => { btnText.textContent = originalText; }, 2000);
  } finally {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}

function highlightSlice(idx) {
  const isActive = window._activeSlice === idx;
  window._activeSlice = isActive ? -1 : idx;

  // 更新卡片樣式
  document.querySelectorAll('.alloc-card').forEach((card, i) => {
    if (i === idx && !isActive) {
      card.style.borderColor = window._allocData[i].color;
      card.style.background = 'rgba(255,255,255,0.03)';
      card.style.transform = 'scale(1.02)';
    } else {
      card.style.borderColor = '#2a2a2a';
      card.style.background = '#0f0f0f';
      card.style.transform = 'scale(1)';
    }
  });

  // 更新 legend 樣式
  document.querySelectorAll('.legend-item').forEach((item, i) => {
    item.style.background = (i === idx && !isActive) ? 'rgba(255,255,255,0.05)' : 'transparent';
  });

  // 更新圓餅圖 offset（放大選中區塊）
  if (window._donutChart) {
    const offsets = window._allocData.map((_, i) => (i === idx && !isActive) ? 16 : 0);
    window._donutChart.data.datasets[0].offset = offsets;
    window._donutChart.update();
  }

  // 卷動到對應卡片
  if (!isActive) {
    const card = document.getElementById(`allocCard_${idx}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}


function restart() {
  currentQ = 0;
  answers = {};
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion();
}
